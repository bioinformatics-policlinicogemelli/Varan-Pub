[Paths]
OUTPUT_FILTERED = snv_filtered
OUTPUT_MAF = maf
VCF2MAF = vcf2maf.pl
REF_FASTA = /genome/genome.fa
TMP = scratch
VEP_PATH = /opt/vep/src/ensembl-vep/
VEP_DATA = /data/
CLINV= 

[OncoKB]
ONCOKB=3c52b1c5-c26b-4b77-b2d8-a3afe128f52b

[Project]
PROJECT_NAME=fpg500
DESCRIPTION='Comprehensive profiling of cancer samples including VUS variants. Generated by the Fondazione Policlinico Universitario Agostino Gemelli IRCCS'
PROFILE="Sequencing of  tumor via TruSight Oncology 500 High Throughput panel (TSO500HT) on Illumina NovaSeq6000 sequencers"

[Filters]
FILTER=["PASS"]
BENIGN=benign|likely_benign|risk_factor
t_VAF_min=0.05
t_VAF_max=0.98
gnomAD=0.0003
CLIN_SIG=["pathogenic","likely_pathogenic","drug_response"] 
CONSEQUENCES=["splice_region_variant","frameshift_variant","splice_donor_variant","stop_gained","splice_acceptor_variant","start_lost","inframe_insertion","inframe_deletion"]
POLYPHEN=["benign"]
IMPACT=["LOW"]
ONCOKB_FILTER=["Likely Oncogenic","Oncogenic"]
SIFT=["tolerated"]


[TMB]
THRESHOLD= {'Low (< 5)':'5','Medium (5< x <10)':'10','High (>=10)':'10'}

[MSI]
THRESHOLD=20
